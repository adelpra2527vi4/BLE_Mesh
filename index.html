<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESP32 Mesh Controller</title>
<style>
  :root {
    --bg:#0f1117; --surface:#1a1d27; --surface2:#22263a;
    --accent:#4f98a3; --accent-hover:#3a7a85;
    --text:#e2e8f0; --muted:#64748b; --success:#6daa45;
    --error:#dd6974; --warn:#e8af34; --radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;
       min-height:100dvh;padding:1.5rem}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem}
  h1{font-size:1.4rem;font-weight:600}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--muted);transition:background .3s}
  .dot.connected{background:var(--success);box-shadow:0 0 8px var(--success)}
  .card{background:var(--surface);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem}
  .card h2{font-size:.85rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:1rem}
  button{cursor:pointer;border:none;border-radius:8px;font-size:.9rem;font-weight:500;
         padding:.6rem 1.2rem;transition:all .18s}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:var(--accent-hover)}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed}
  .btn-ghost{background:var(--surface2);color:var(--text)}
  .btn-ghost:hover{background:#2d3250}
  .btn-danger{background:#7f1d1d;color:#fca5a5}
  .btn-danger:hover{background:#991b1b}
  .row{display:flex;gap:.75rem;flex-wrap:wrap}
  .toggle-wrap{display:flex;align-items:center;gap:1rem}
  .toggle{position:relative;width:56px;height:30px}
  .toggle input{opacity:0;width:0;height:0}
  .slider{position:absolute;inset:0;background:var(--surface2);border-radius:30px;
          cursor:pointer;transition:.3s}
  .slider::before{content:'';position:absolute;width:22px;height:22px;left:4px;bottom:4px;
                  background:#fff;border-radius:50%;transition:.3s}
  input:checked+.slider{background:var(--accent)}
  input:checked+.slider::before{transform:translateX(26px)}
  .device-item{display:flex;align-items:center;justify-content:space-between;
               padding:.75rem;background:var(--surface2);border-radius:8px;
               margin-bottom:.5rem;gap:.75rem}
  .device-addr{font-family:monospace;font-size:.9rem;color:var(--accent)}
  .device-uuid{font-size:.75rem;color:var(--muted);margin-top:.2rem;font-family:monospace}
  .badge{font-size:.7rem;padding:.2rem .5rem;border-radius:20px}
  .badge-ok{background:#1a3a12;color:var(--success)}
  .badge-pending{background:#3a3010;color:var(--warn)}
  #log{background:#0a0c12;border-radius:8px;padding:1rem;font-family:monospace;
       font-size:.78rem;color:#94a3b8;max-height:160px;overflow-y:auto;line-height:1.6}
  #log .ts{color:var(--muted)}
  #log .ok{color:var(--success)}
  #log .err{color:var(--error)}
  #log .info{color:var(--accent)}
  .addr-input{background:var(--surface2);border:1px solid #2d3250;color:var(--text);
              border-radius:6px;padding:.5rem .75rem;font-family:monospace;
              width:100px;font-size:.9rem}
  .ws-input{background:var(--surface2);border:1px solid #2d3250;color:var(--text);
            border-radius:6px;padding:.5rem .75rem;font-size:.9rem;flex:1}
</style>
</head>
<body>

<header>
  <h1>🔷 ESP32 Mesh</h1>
  <div style="display:flex;align-items:center;gap:.5rem">
    <span id="conn-label" style="font-size:.8rem;color:var(--muted)">Disconnesso</span>
    <div class="dot" id="dot"></div>
  </div>
</header>

<!-- Connessione WebSocket -->
<div class="card">
  <h2>Connessione WiFi</h2>
  <p style="font-size:.8rem;color:var(--muted);margin-bottom:.75rem">
    Connetti il dispositivo al WiFi <b>ESP32-Mesh</b> (password: <b>12345678</b>), poi premi Connetti.
  </p>
  <div class="row">
    <input class="ws-input" id="ws-url" value="ws://192.168.4.1/ws" placeholder="ws://192.168.4.1/ws">
    <button class="btn-primary" id="btn-connect">Connetti</button>
    <button class="btn-ghost"   id="btn-disconnect" disabled>Disconnetti</button>
  </div>
</div>

<!-- Controllo rapido -->
<div class="card">
  <h2>Controllo rapido</h2>
  <div class="toggle-wrap">
    <span>Spegni</span>
    <label class="toggle">
      <input type="checkbox" id="main-toggle" disabled onchange="sendOnOff(this.checked)">
      <span class="slider"></span>
    </label>
    <span>Accendi</span>
    <input class="addr-input" id="target-addr" value="49152"
           placeholder="addr decimal" title="Indirizzo mesh (decimale)">
  </div>
</div>

<!-- Scan + Dispositivi -->
<div class="card">
  <h2>Scan rete mesh</h2>
  <div class="row" style="margin-bottom:1rem">
    <button class="btn-ghost" id="btn-scan" disabled onclick="startScan()">▶ Avvia scan</button>
    <button class="btn-ghost" id="btn-list" disabled onclick="requestList()">↻ Aggiorna lista</button>
  </div>
  <div id="device-list">
    <p style="color:var(--muted);font-size:.85rem">Nessun dispositivo rilevato.</p>
  </div>
</div>

<!-- Log -->
<div class="card">
  <h2>Log</h2>
  <div id="log"></div>
</div>

<script>
let ws = null;
let devices = [];

function log(msg, type='') {
  const el = document.getElementById('log');
  const ts = new Date().toLocaleTimeString('it-IT',{hour12:false});
  el.innerHTML += `<div><span class="ts">[${ts}]</span> <span class="${type}">${msg}</span></div>`;
  el.scrollTop = el.scrollHeight;
}

function setConnected(v) {
  document.getElementById('dot').classList.toggle('connected', v);
  document.getElementById('conn-label').textContent = v ? 'Connesso' : 'Disconnesso';
  document.getElementById('btn-connect').disabled    = v;
  document.getElementById('btn-disconnect').disabled = !v;
  document.getElementById('main-toggle').disabled    = !v;
  document.getElementById('btn-scan').disabled       = !v;
  document.getElementById('btn-list').disabled       = !v;
  document.getElementById('target-addr').disabled    = !v;
}

function connect() {
  const url = document.getElementById('ws-url').value.trim();
  log('Connessione a ' + url + '...', 'info');
  ws = new WebSocket(url);

  ws.onopen = () => {
    setConnected(true);
    log('Connesso!', 'ok');
    requestList();
  };

  ws.onclose = () => {
    setConnected(false);
    log('Disconnesso', 'err');
    ws = null;
  };

  ws.onerror = (e) => {
    log('Errore WebSocket', 'err');
  };

  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.type === 'devlist') {
        devices = data.nodes || [];
        renderDevices();
        log(`Lista aggiornata: ${devices.length} nodi`, 'info');
      } else if (data.type === 'status') {
        log('Status: ' + data.msg, data.msg.startsWith('PROV') ? 'ok' : 'info');
        if (data.msg.startsWith('PROV')) requestList();
      }
    } catch(err) {
      log('Msg: ' + e.data, 'info');
    }
  };
}

function disconnect() {
  if (ws) ws.close();
}

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN)
    ws.send(JSON.stringify(obj));
  else
    log('Non connesso', 'err');
}

function sendOnOff(state) {
  const addr = parseInt(document.getElementById('target-addr').value);
  if (isNaN(addr)) { log('Indirizzo non valido', 'err'); return; }
  send({cmd:'onoff', addr, state});
  log(`Inviato ${state?'ON':'OFF'} → ${addr} (0x${addr.toString(16).toUpperCase()})`, 'ok');
}

function startScan()   { send({cmd:'scan'}); log('Scan avviato', 'info'); }
function requestList() { send({cmd:'list'}); }

function provisionDevice(uuidHex) {
  send({cmd:'prov', uuid: uuidHex});
  log('Provisioning richiesto: ' + uuidHex, 'info');
}

function sendOnOffDirect(addr, state) {
  send({cmd:'onoff', addr, state});
  log(`Diretto ${state?'ON':'OFF'} → ${addr}`, 'ok');
}

function renderDevices() {
  const el = document.getElementById('device-list');
  if (!devices.length) {
    el.innerHTML = '<p style="color:var(--muted);font-size:.85rem">Nessun dispositivo.</p>';
    return;
  }
  el.innerHTML = devices.map(d => `
    <div class="device-item">
      <div>
        <div class="device-addr">${d.prov ? '0x'+d.addr.toString(16).toUpperCase().padStart(4,'0') : '—'}</div>
        <div class="device-uuid">${d.uuid}</div>
      </div>
      <div style="display:flex;gap:.5rem;align-items:center">
        <span class="badge ${d.prov?'badge-ok':'badge-pending'}">${d.prov?'✓ Provisionato':'Non provisionato'}</span>
        ${!d.prov ? `<button class="btn-primary" style="font-size:.8rem;padding:.4rem .8rem"
          onclick="provisionDevice('${d.uuid}')">Provisiona</button>` : ''}
        ${d.prov ? `
          <button class="btn-ghost"   style="font-size:.8rem;padding:.4rem .8rem"
            onclick="sendOnOffDirect(${d.addr},true)">ON</button>
          <button class="btn-danger"  style="font-size:.8rem;padding:.4rem .8rem"
            onclick="sendOnOffDirect(${d.addr},false)">OFF</button>` : ''}
      </div>
    </div>
  `).join('');
}

document.getElementById('btn-connect').addEventListener('click', connect);
document.getElementById('btn-disconnect').addEventListener('click', disconnect);

setConnected(false);
log('App pronta. Connettiti al WiFi ESP32-Mesh poi clicca Connetti.', 'info');
</script>
</body>
</html>
